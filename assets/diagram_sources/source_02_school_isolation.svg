nt-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        &quot;same_level_school_count_within_10km&quot;, &quot;isolation_score&quot;]:</text><text x="34" y="794" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">297</text><text x="100" y="794" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        iso[c] = np.nan</text><text x="34" y="818" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">298</text><text x="100" y="818" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">    iso[&quot;no_same_level_school_within_5km_flag&quot;] = pd.Series(pd.NA, index=iso.index, dtype=&quot;object&quot;)</text><text x="34" y="842" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">299</text><text x="100" y="842" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">    </text><text x="34" y="866" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">300</text><text x="100" y="866" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">    for (year, level), idx in iso[iso[&quot;coordinate_valid&quot;]].groupby([&quot;year&quot;, </text><text x="34" y="890" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585"></text><text x="100" y="890" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        &quot;school_level&quot;]).groups.items():</text><text x="34" y="914" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">301</text><text x="100" y="914" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        idx_list = list(idx)</text><text x="34" y="938" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">302</text><text x="100" y="938" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        c