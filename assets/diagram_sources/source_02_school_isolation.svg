e" font-size="16" fill="#858585">310</text><text x="100" y="1130" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        cnt3 = tree.query_radius(coords, r=3 / radius, count_only=True) - 1</text><text x="34" y="1154" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">311</text><text x="100" y="1154" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        cnt5 = tree.query_radius(coords, r=5 / radius, count_only=True) - 1</text><text x="34" y="1178" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">312</text><text x="100" y="1178" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        cnt10 = tree.query_radius(coords, r=10 / radius, count_only=True) - 1</text><text x="34" y="1202" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">313</text><text x="100" y="1202" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        </text><text x="34" y="1226" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">314</text><text x="100" y="1226" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;nearest_same_level_distance_km&quot;] = nearest</text><text x="34" y="1250" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">315</text><text x="100" y="1250" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;second_nearest_same_level_distance_km&quot;] = second</text><text x="34" y="1274" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">316</text><text x="100" y="1274" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;same_level_school_count_within_3km&quot;] = cnt3</text><text x="34" y="1298" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">317</text><text x="100" y="1298" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;same_level_school_count_within_5km&quot;] = cnt5</text><text x="34" y="1322" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">318</text><text x="100" y="1322" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;same_level_school_count_within_10km&quot;] = cnt10</text><text x="34" y="1346" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">319</text><text x="100" y="1346" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;no_same_level_school_within_5km_flag&quot;] = cnt5 == 0</text><text x="34" y="1370" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">320</text><text x="100" y="1370" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">        iso.loc[idx_list, &quot;isolation_score&quot;] = nearest / (1 + cnt5)</text><text x="34" y="1394" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">321</text><text x="100" y="1394" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#D4D4D4">        </text><text x="34" y="1418" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#858585">322</text><text x="100" y="1418" font-family="Menlo,Consolas,D2Coding,monospace" font-size="16" fill="#CE9178">    iso[&quot;isolation_score_version&quot;] = &quot;v5_haversine_nearest_div_1_plus_5km_count&quot;</text></g>
